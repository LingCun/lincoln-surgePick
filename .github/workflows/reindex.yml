name: Reindex (daily + manual)

# universe-*.json 새로 빌드 → ticker DB 재적재 → 신규 종목 가격 backfill → autocomplete index → commit.
# 매일 KST 17:00 (08:00 UTC) 자동 실행 + 수동 트리거 가능.
# KOSPI 200 / S&P 500 / KOSDAQ 상위 / 수동 extras 모두 갱신.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'   # daily 08:00 UTC = KST 17:00 / ET 03:00 (혹은 04:00 EDT)

jobs:
  reindex:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build universe JSON
        run: node scripts/build-universe.mjs

      - name: Ingest tickers
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: npm run ingest:tickers

      - name: Backfill prices for any new/sparse tickers
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: npm run backfill:prices:new

      - name: Rebuild autocomplete index
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: npm run build:index

      - name: Commit universe + index
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/universe-kr.json scripts/universe-us.json public/tickers-index.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: reindex (universe + tickers-index)"
            git push
          fi
