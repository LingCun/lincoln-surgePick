name: Daily data scan

on:
  schedule:
    # KR 본장 마감: 16:00 KST = UTC 07:00 (KOSPI 15:30 + 30분 버퍼)
    - cron: '0 7 * * 1-5'
    # KR 시간외 단일가 마감: 18:30 KST = UTC 09:30 (시간외 18:00 + 30분)
    - cron: '30 9 * * 1-5'
    # US 본장 마감: NYSE 16:00 ET + 30분 버퍼 = 16:30 ET
    #   EDT(UTC-4) 20:30 UTC → 05:30 KST 다음날
    - cron: '30 20 * * 1-5'
    #   EST(UTC-5) 21:30 UTC → 06:30 KST 다음날
    - cron: '30 21 * * 1-5'
    # US 애프터장 마감: NYSE after-hours 20:00 ET + 30분 = 20:30 ET
    #   EDT(UTC-4) 00:30 UTC → 09:30 KST 다음날
    - cron: '30 0 * * 2-6'
    #   EST(UTC-5) 01:30 UTC → 10:30 KST 다음날
    - cron: '30 1 * * 2-6'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Determine market from cron
        id: which
        run: |
          case "${{ github.event.schedule }}" in
            "0 7 * * 1-5")    echo "MARKET=kr" >> $GITHUB_OUTPUT ;;
            "30 9 * * 1-5")   echo "MARKET=kr" >> $GITHUB_OUTPUT ;;
            "30 20 * * 1-5")  echo "MARKET=us" >> $GITHUB_OUTPUT ;;
            "30 21 * * 1-5")  echo "MARKET=us" >> $GITHUB_OUTPUT ;;
            "30 0 * * 2-6")   echo "MARKET=us" >> $GITHUB_OUTPUT ;;
            "30 1 * * 2-6")   echo "MARKET=us" >> $GITHUB_OUTPUT ;;
            *)                echo "MARKET=all" >> $GITHUB_OUTPUT ;;
          esac

      - name: Run scan + ingest
        run: npm run scan
        env:
          MARKET: ${{ steps.which.outputs.MARKET }}
          NODE_OPTIONS: --max-old-space-size=2048
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Commit data changes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            STAMP=$(date -u +%Y-%m-%d_%H%MZ)
            git commit -m "data: scheduled scan ${STAMP}"
            git push
          fi
