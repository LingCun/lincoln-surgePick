name: Daily data scan

on:
  schedule:
    # KR 마감 후 → KST 17:00 = UTC 08:00 (KOSPI 15:30 마감 + 1.5h 버퍼)
    - cron: '0 8 * * 1-5'
    # US 마감 후 → KST 05:00 EDT 시즌 = UTC 20:00 (NYSE 16:00 ET EDT 직후, +1h 버퍼)
    - cron: '0 20 * * 1-5'
    # US 마감 후 EST 시즌 = UTC 21:00 (NYSE 16:00 ET EST 직후, +1h 버퍼)
    - cron: '0 21 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run scan + ingest
        run: npm run scan
        env:
          NODE_OPTIONS: --max-old-space-size=2048
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Commit data changes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            STAMP=$(date -u +%Y-%m-%d_%H%MZ)
            git commit -m "data: scheduled scan ${STAMP}"
            git push
          fi
